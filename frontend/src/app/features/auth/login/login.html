<div class="flex min-h-screen items-center justify-center bg-gradient-to-br from-blue-50 to-indigo-100 px-4">
  <div class="w-full max-w-sm rounded-3xl bg-white p-8 shadow-xl sm:p-10">

    <!-- Header -->
    <div class="mb-6 text-center">
      <div class="mb-2 flex items-center justify-center gap-2">
        <span class="text-2xl font-bold text-blue-600">e-SHOPPERS</span>
      </div>

      <!-- Redirect message -->
      @if (redirectMessage) {
        <div class="mb-4 rounded-lg border border-amber-200 bg-amber-50 px-4 py-3 text-sm text-amber-800">
          {{ redirectMessage }}
        </div>
      }

      <h1 class="text-2xl font-bold text-gray-800">Welcome Back!</h1>
    </div>

    <!-- ── Email login form ───────────────────────────────────────────────── -->
    @if (!showGuestForm()) {
      <form #signinForm="ngForm" (ngSubmit)="signin(signinForm)" class="space-y-6">
        <app-input
          type="email"
          name="email"
          autocomplete="email"
          [(ngModel)]="form.email"
          #email="ngModel"
          required
          email
          placeholder="Enter your email"
          [invalid]="!!(email.invalid && signinForm.submitted)"
          [errorMessage]="
            email.invalid && signinForm.submitted
              ? (email.errors?.['required'] ? 'Email is required' : email.errors?.['email'] ? 'Enter valid email' : '')
              : ''
          "
        ></app-input>

        <app-input
          type="password"
          name="password"
          autocomplete="current-password"
          [(ngModel)]="form.password"
          #password="ngModel"
          required
          placeholder="Enter your password"
          [invalid]="!!(password.invalid && signinForm.submitted)"
          [errorMessage]="
            password.invalid && signinForm.submitted && password.errors?.['required']
              ? 'Password is required' : ''
          "
        ></app-input>

        <div class="flex justify-center pt-2">
          <app-button
            label="Sign In"
            type="submit"
            variant="primary"
            [loading]="!!(loading$ | async)"
          ></app-button>
        </div>

        <app-error-message [message]="(error$ | async) ?? ''"></app-error-message>

        <p class="text-center text-sm text-gray-500">
          Don't have an account?
          <button type="button" (click)="signup()"
            class="ml-1 cursor-pointer font-semibold text-blue-600 hover:text-blue-700">
            Sign Up
          </button>
        </p>
      </form>

      <!-- Divider -->
      <div class="my-5 flex items-center gap-3">
        <div class="h-px flex-1 bg-slate-200"></div>
        <span class="text-xs text-slate-400">or</span>
        <div class="h-px flex-1 bg-slate-200"></div>
      </div>

      <!-- Google button -->
      <div class="mb-4">
        <p class="mb-2 text-center text-sm text-slate-500">Continue with Google</p>
        <div #googleBtn class="flex justify-center"></div>
      </div>

      <!-- Continue as Guest button -->
      <button type="button" (click)="toggleGuestForm()"
        class="mt-2 w-full rounded-xl border border-slate-300 bg-slate-50 px-4 py-2.5 text-sm font-semibold text-slate-700 transition hover:bg-slate-100">
        Continue as Guest
      </button>
    }

    <!-- ── Guest login form ───────────────────────────────────────────────── -->
    @if (showGuestForm()) {
      <div>
        <!-- Back button -->
        <button type="button" (click)="toggleGuestForm()"
          class="mb-5 flex items-center gap-1 text-sm font-medium text-blue-600 hover:text-blue-700">
          ← Back to Sign In
        </button>

        <h2 class="mb-5 text-lg font-bold text-slate-800">Continue as Guest</h2>

        <form #guestSigninForm="ngForm" (ngSubmit)="guestSignin(guestSigninForm)" class="space-y-5">
          <app-input
            type="text"
            name="guestName"
            [(ngModel)]="guestForm.name"
            #guestName="ngModel"
            required
            placeholder="Your name"
            [invalid]="!!(guestName.invalid && guestSigninForm.submitted)"
            [errorMessage]="
              guestName.invalid && guestSigninForm.submitted && guestName.errors?.['required']
                ? 'Name is required' : ''
            "
          ></app-input>

          <app-input
            type="tel"
            name="guestPhone"
            [(ngModel)]="guestForm.phone"
            #guestPhone="ngModel"
            required
            pattern="[0-9]{10,15}"
            placeholder="Phone number"
            [invalid]="!!(guestPhone.invalid && guestSigninForm.submitted)"
            [errorMessage]="
              guestPhone.invalid && guestSigninForm.submitted
                ? (guestPhone.errors?.['required'] ? 'Phone is required' : 'Enter a valid phone number')
                : ''
            "
          ></app-input>

          <div class="flex justify-center pt-2">
            <app-button
              label="Continue as Guest"
              type="submit"
              variant="primary"
              [loading]="!!(loading$ | async)"
            ></app-button>
          </div>

          <app-error-message [message]="(error$ | async) ?? ''"></app-error-message>
        </form>

        <p class="mt-5 text-center text-xs text-slate-400">
          Guest sessions expire after <span class="font-semibold">4 days</span>.
        </p>
      </div>
    }

  </div>
</div>
