<!-- filename: payment-status.html -->

<app-header></app-header>

<main class="flex min-h-screen items-center justify-center bg-[#eaeded] px-4">

  @if (status === 'success') {
    <div class="w-full max-w-md rounded-md bg-white p-8 text-center shadow-sm">

      <!-- Green checkmark -->
      <div class="mx-auto flex h-16 w-16 items-center justify-center
                  rounded-full bg-green-100">
        <svg class="h-8 w-8 text-green-600" fill="none"
             stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
                stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
      </div>

      <h1 class="mt-4 text-2xl font-bold text-slate-900">Payment Successful!</h1>
      <p class="mt-2 text-sm text-slate-500">
        Your order has been placed. A receipt will be sent to your email.
      </p>

      <div class="mt-6 flex flex-col gap-3">
        <a routerLink="/home"
           class="w-full rounded-full bg-[#ffd814] py-3 text-sm font-bold
                  text-[#131921] hover:bg-[#f7ca00] text-center">
          Continue Shopping
        </a>
      </div>
    </div>

  } @else {
    <div class="w-full max-w-md rounded-md bg-white p-8 text-center shadow-sm">

      <!-- Red X -->
      <div class="mx-auto flex h-16 w-16 items-center justify-center
                  rounded-full bg-red-100">
        <svg class="h-8 w-8 text-red-600" fill="none"
             stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
                stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </div>

      <h1 class="mt-4 text-2xl font-bold text-slate-900">Payment Failed</h1>
      <p class="mt-2 text-sm text-slate-500">
        Something went wrong with your payment. Please try again.
      </p>

      <div class="mt-6">
        <a routerLink="/checkout"
           class="w-full rounded-full bg-[#131921] py-3 text-sm font-bold
                  text-white hover:bg-[#232f3e] text-center block">
          Try Again
        </a>
      </div>
    </div>
  }

</main>

<app-footer></app-footer>
