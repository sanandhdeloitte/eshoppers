<app-header></app-header>

<main class="min-h-screen bg-[#eaeded] py-4 sm:py-8">
  <div class="mx-auto max-w-7xl px-3 sm:px-4">
    <section class="rounded-md bg-white p-4 shadow-sm sm:p-6">
      <h1 class="border-b border-slate-200 pb-4 text-2xl font-normal text-slate-900 sm:text-3xl">
        Your Wishlist
      </h1>

      @if (products().length === 0) {
        <div class="py-10">
          <p class="text-slate-600">Your wishlist is empty.</p>
          <a routerLink="/home" class="mt-4 inline-block text-sm text-[#007185] hover:underline">
            Browse products
          </a>
        </div>
      } @else {
        <div class="mt-6 grid gap-4 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
          @for (product of products(); track product.id) {
            <div class="rounded-md border border-slate-200 bg-white p-4 shadow-sm flex flex-col">

              <a [routerLink]="['/products', product.id]" class="block">
                <img [src]="product.image || product.thumbnail"
                     [alt]="product.title || product.name"
                     class="mx-auto h-44 w-full object-contain hover:opacity-80 transition sm:h-48"/>
              </a>

              <a [routerLink]="['/products', product.id]"
                 class="mt-4 line-clamp-2 min-h-12 text-base font-medium text-slate-900 hover:text-[#007185] hover:underline">
                {{ product.title || product.name }}
              </a>

              <p class="mt-2 text-2xl font-semibold text-slate-900">
                {{ product.price | currency: 'USD' : 'symbol' : '1.0-0' }}
              </p>

              <div class="mt-4 space-y-2 mt-auto">
                <button type="button" (click)="moveToCart(product)"
                  class="w-full rounded-full border border-[#fcd200] bg-[#ffd814] px-4 py-2.5 text-sm font-medium text-slate-900 hover:bg-[#f7ca00]">
                  Add to Cart
                </button>
                <button type="button" (click)="remove(product)"
                  class="w-full rounded-full border border-slate-300 bg-white px-4 py-2.5 text-sm font-medium text-slate-700 hover:bg-slate-50">
                  Remove
                </button>
              </div>
            </div>
          }
        </div>
      }
    </section>
  </div>
</main>

<app-footer></app-footer>
