<!-- filename: header.html -->

<header class="sticky top-0 z-50 bg-[#131921] text-white shadow-md">
  <div class="mx-auto max-w-7xl px-3 py-2 sm:px-4 sm:py-3">
    <!-- Row 1: logo · desktop-search · icons -->
    <div class="flex items-center gap-2 sm:gap-4">
      <!-- Logo -->
      <a
        routerLink="/home"
        class="flex shrink-0 items-center gap-1 text-xl font-extrabold tracking-tight sm:text-2xl"
      >
        <span>e</span><span class="text-[#f3a847]">SHOPPERS</span>
      </a>

      <!-- Search — hidden on mobile, shown md+ -->
      <div class="relative hidden flex-1 md:block">
        <input
          type="text"
          placeholder="Search eSHOPPERS"
          [ngModel]="(searchTerm$ | async) ?? ''"
          (ngModelChange)="onSearch($event)"
          class="w-full rounded-md bg-white py-2.5 pl-4 pr-10 text-sm text-slate-800 outline-none ring-2 ring-transparent transition focus:ring-[#f3a847]"
        />
        @if (searchTerm$ | async; as term) {
          @if (term) {
            <button
              type="button"
              (click)="onSearch('')"
              class="absolute inset-y-0 right-3 flex items-center text-slate-500 hover:text-slate-700"
            >
              <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M6 18L18 6M6 6l12 12"
                />
              </svg>
            </button>
          }
        }
      </div>

      <!-- Right-side icons -->
      <div class="ml-auto flex items-center gap-1 sm:gap-2">
        @if (user$ | async; as user) {
          <a
            routerLink="/about"
            class="hidden items-center gap-1 text-xs font-medium text-white hover:text-[#ffd814] transition sm:flex"
          >
            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M13 16h-1v-4h-1m1-4h.01M12 2a10 10 0 100 20A10 10 0 0012 2z"
              />
            </svg>
            <span>About</span>
          </a>
          <a
            routerLink="/orders"
            class="flex items-center gap-1 rounded-md px-2 py-1.5 text-sm hover:bg-white/10 sm:px-3 sm:py-2"
          >
            <span class="hidden sm:inline">Orders</span>
            <svg class="h-4 w-4 sm:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2
             M9 5a2 2 0 002 2h2a2 2 0 002-2
             M9 5a2 2 0 012-2h2a2 2 0 012 2"
              />
            </svg>
          </a>

          <!-- Wishlist -->
          <a
            routerLink="/wishlist"
            class="flex items-center gap-1 rounded-md px-2 py-1.5 text-sm hover:bg-white/10 sm:px-3 sm:py-2"
          >
            <span class="hidden sm:inline">Wishlist</span>
            <span class="rounded-full bg-[#f08804] px-1.5 py-0.5 text-xs font-bold">
              {{ lists.wishlistCount() }}
            </span>
          </a>

          <!-- Cart -->
          <a
            routerLink="/cart"
            class="flex items-center gap-1 rounded-md px-2 py-1.5 text-sm hover:bg-white/10 sm:px-3 sm:py-2"
          >
            <span class="hidden sm:inline">Cart</span>
            <span class="rounded-full bg-[#f08804] px-1.5 py-0.5 text-xs font-bold">
              {{ lists.cartCount() }}
            </span>
          </a>

          <!-- Profile -->
          <button
            type="button"
            (click)="profileClicked()"
            class="flex items-center gap-1 rounded-md px-2 py-1.5 hover:bg-white/10 sm:px-3 sm:py-2"
          >
            @if (user.picture) {
              <img
                [src]="user.picture"
                [alt]="user.name"
                class="h-7 w-7 rounded-full object-cover sm:h-8 sm:w-8"
              />
            } @else {
              <div
                class="flex h-7 w-7 items-center justify-center rounded-full bg-slate-200 text-xs font-bold text-slate-800 sm:h-8 sm:w-8"
              >
                {{ user.name.charAt(0).toUpperCase() }}
              </div>
            }
            <span class="hidden text-sm font-medium lg:inline">{{ user.name }}</span>
          </button>

          <!-- Logout -->
          <button
            type="button"
            (click)="logout()"
            class="rounded-md border border-slate-500 px-2 py-1.5 text-xs hover:border-white hover:bg-[#232f3e] sm:px-3 sm:py-2 sm:text-sm"
          >
            Logout
          </button>
        } @else {
          <!-- NEW: Guest Sign In button -->
          <button
            type="button"
            (click)="goToLogin()"
            class="rounded-md border border-[#f3a847] px-3 py-1.5 text-sm font-semibold text-[#f3a847] transition hover:bg-[#f3a847] hover:text-[#131921]"
          >
            Sign In
          </button>
        }
      </div>
    </div>

    <!-- Row 2: Mobile search — visible only below md -->
    <div class="relative mt-2 md:hidden">
      <input
        type="text"
        placeholder="Search eSHOPPERS"
        [ngModel]="(searchTerm$ | async) ?? ''"
        (ngModelChange)="onSearch($event)"
        class="w-full rounded-md bg-white py-2 pl-4 pr-10 text-sm text-slate-800 outline-none ring-2 ring-transparent transition focus:ring-[#f3a847]"
      />
      @if (searchTerm$ | async; as term) {
        @if (term) {
          <button
            type="button"
            (click)="onSearch('')"
            class="absolute inset-y-0 right-3 flex items-center text-slate-500 hover:text-slate-700"
          >
            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M6 18L18 6M6 6l12 12"
              />
            </svg>
          </button>
        }
      }
    </div>
  </div>
</header>
