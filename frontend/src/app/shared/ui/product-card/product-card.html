<!-- filename: product-card.html -->
<!-- Code Generated by Sidekick is for learning and experimentation purposes only. -->
@if (skeleton) {
  <article class="overflow-hidden rounded-md border border-slate-200 bg-white shadow-sm">
    <div class="h-56 animate-pulse bg-slate-200"></div>
    <div class="space-y-3 p-4">
      <div class="h-5 w-2/3 animate-pulse rounded bg-slate-200"></div>
      <div class="h-4 w-full animate-pulse rounded bg-slate-200"></div>
      <div class="h-4 w-1/2 animate-pulse rounded bg-slate-200"></div>
      <div class="h-10 animate-pulse rounded-full bg-slate-200"></div>
    </div>
  </article>
} @else if (product; as item) {
  <article class="group overflow-hidden rounded-md border border-slate-200 bg-white shadow-sm transition hover:shadow-md">
    <div class="relative bg-white p-4">
      <a [routerLink]="['/products', item.id]" class="block">
        <img
          [src]="item.image || item.thumbnail"
          [alt]="item.title || item.name"
          class="mx-auto h-52 w-full object-contain"
        />
      </a>

      <button
        type="button"
        (click)="toggleWishlist($event)"
        class="absolute right-3 top-3 flex h-9 w-9 items-center justify-center rounded-full border border-slate-200 bg-white shadow-sm"
        [attr.aria-label]="isWishlisted() ? 'Remove from wishlist' : 'Add to wishlist'"
      >
        <svg
          viewBox="0 0 24 24"
          class="h-5 w-5"
          [ngClass]="isWishlisted() ? 'fill-red-500 text-red-500' : 'fill-none text-slate-500'"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M12 21s-6.716-4.35-9.193-8.18C.59 9.41 2.01 5.25 5.857 4.37A5.46 5.46 0 0 1 12 6.09a5.46 5.46 0 0 1 6.143-1.72c3.847.88 5.267 5.04 3.05 8.45C18.716 16.65 12 21 12 21z"
          />
        </svg>
      </button>
    </div>

    <div class="space-y-3 p-4">
      <a [routerLink]="['/products', item.id]" class="block">
        <p class="text-xs font-medium uppercase tracking-wide text-[#007185]">
          {{ item.category }}
        </p>

        <h3 class="line-clamp-2 min-h-12 text-base font-medium text-slate-900 group-hover:text-[#c7511f]">
          {{ item.title || item.name }}
        </h3>

        @if (item.rating != null) {
          <p class="text-sm text-[#b12704]">Rating: {{ item.rating }}/5</p>
        }

        <p class="text-2xl font-semibold text-slate-900">
          {{ item.price | currency: 'USD' : 'symbol' : '1.0-0' }}
        </p>
      </a>

      <button
        type="button"
        (click)="addToCart($event)"
        class="w-full rounded-full border border-[#fcd200] bg-[#ffd814] px-4 py-2.5 text-sm font-medium text-slate-900 transition hover:bg-[#f7ca00]"
      >
        Add to Cart
        @if (cartQty() > 0) {
          <span class="ml-1 font-semibold">({{ cartQty() }})</span>
        }
      </button>
    </div>
  </article>
}
